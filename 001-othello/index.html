<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Othello Game - モダンオセロ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header class="game-header">
        <h1>OTHELLO</h1>
        <p class="subtitle">モダンオセロゲーム</p>
      </header>

      <div class="game-info">
        <div class="player-info black-player" id="blackPlayer">
          <div class="player-icon">
            <div class="stone black"></div>
          </div>
          <div class="player-details">
            <div class="player-name">YOU</div>
            <div class="player-score" id="blackScore">2</div>
          </div>
        </div>

        <div class="turn-indicator" id="turnIndicator">
          <div class="turn-text">現在のターン</div>
          <div class="current-turn" id="currentTurn">YOU</div>
        </div>

        <div class="player-info white-player" id="whitePlayer">
          <div class="player-icon">
            <div class="stone white"></div>
          </div>
          <div class="player-details">
            <div class="player-name">CPU</div>
            <div class="player-score" id="whiteScore">2</div>
          </div>
        </div>
      </div>

      <div class="game-message" id="gameMessage"></div>

      <div class="board-container">
        <div class="board" id="board"></div>
      </div>

      <div class="game-controls">
        <button class="btn btn-reset" id="resetBtn">
          <span class="btn-icon">↻</span>
          リセット
        </button>
        <button class="btn btn-hint" id="hintBtn">
          <span class="btn-icon">💡</span>
          ヒント
        </button>
      </div>
    </div>

    <div class="modal" id="gameOverModal">
      <div class="modal-content">
        <h2 class="modal-title">ゲーム終了!</h2>
        <div class="modal-result" id="modalResult"></div>
        <div class="modal-scores">
          <div class="modal-score">
            <div class="stone black"></div>
            <span id="modalBlackScore">0</span>
          </div>
          <div class="modal-score">
            <div class="stone white"></div>
            <span id="modalWhiteScore">0</span>
          </div>
        </div>
        <button class="btn btn-primary" id="playAgainBtn">
          もう一度プレイ
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
